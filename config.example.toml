flour_params = "orgId=101&tblId=DT_1J22001&objL1=T10&objL2=A01108&itmId=T&prdSe=M&newEstPrdCnt=120"
sugar_params = "orgId=101&tblId=DT_1J22001&objL1=T10&objL2=A01808&itmId=T&prdSe=M&newEstPrdCnt=120"
oil_params = "orgId=101&tblId=DT_1J22001&objL1=T10&objL2=A01502&itmId=T&prdSe=M&newEstPrdCnt=120"
